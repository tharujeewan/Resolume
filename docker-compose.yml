version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eventwall-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventwall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: eventwall-server
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/eventwall?schema=public"
      PORT: 5000
      JWT_SECRET: "eventwall_jwt_secret_key_change_me_in_prod_12345"
      JWT_REFRESH_SECRET: "eventwall_jwt_refresh_secret_key_change_me_in_prod_54321"
      UPLOAD_DIR: "/uploads"
      CORS_ORIGIN: "http://localhost"
    ports:
      - "5000:5000"
    volumes:
      - shared_uploads:/uploads
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: eventwall-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  shared_uploads:
