version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eventwall-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventwall
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: eventwall-server
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - shared_uploads:/uploads
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: eventwall-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  shared_uploads:
